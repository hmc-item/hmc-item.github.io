<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>샘플 문항 | 문항개발 워크샵</title>
<link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/items.css">
<link rel="stylesheet" href="css/samples.css"></head>
<body><nav id="navbar"></nav><div class="page-wrapper">
  <div class="items-header">
    <div class="items-header-left">
      <button class="btn-back" data-act="sback">← 뒤로</button>
      <div><h1 class="items-title">샘플 문항 뱅크</h1>
        <div class="items-meta"><span class="items-cat">외부 자격 발췌 · 직접 개발 샘플</span>
          <span id="sp-ro-badge" class="ro-badge" style="display:none;">👁 읽기 전용</span></div></div>
    </div>
    <div class="items-rate"><span>총</span><strong id="sp-count">0</strong></div>
  </div>

  <div class="items-main">
    <div class="items-actionbar" id="sp-actionbar" style="display:none;">
      <button class="btn btn-primary btn-sm" data-act="sp-add">+ 샘플 추가</button>
      <button class="btn btn-secondary btn-sm" data-act="sp-open-upload">📤 엑셀 일괄 업로드</button>
      <button class="btn btn-secondary btn-sm" data-act="sp-dl-template">📄 템플릿 다운로드</button>
    </div>
    <div class="sp-filters">
      <input id="sp-f-kw" class="form-control sp-kw" placeholder="🔍 문항/자격명 검색">
      <select id="sp-f-type" class="form-control form-select">
        <option value="">유형 전체</option><option value="mcq">객관식</option><option value="essay">서술형</option></select>
      <select id="sp-f-grade" class="form-control form-select"><option value="">자격등급 전체</option></select>
      <select id="sp-f-comp" class="form-control form-select"><option value="">역량태그 전체</option></select>
      <button class="btn btn-secondary btn-sm" data-act="sp-dl-all" id="sp-dl-all-btn">⬇️ 현재 목록 다운로드</button>
    </div>
    <div class="item-list" id="sp-list"><div class="empty-state">불러오는 중...</div></div>
  </div>
</div>

<!-- 샘플 모달 -->
<div id="sp-modal" class="modal-backdrop" style="display:none;"><div class="modal modal-lg">
  <div class="modal-header"><h2 class="modal-title" id="sp-modal-title">샘플 추가</h2>
    <button class="modal-close" data-act="sp-close">✕</button></div>
  <div class="modal-body"><input type="hidden" id="sp-modal-id">
    <div class="modal-field-row-2col">
      <div class="form-group"><label class="form-label">문항유형 <span class="required">*</span></label>
        <select id="sp-type" class="form-control form-select">
          <option value="mcq">객관식</option><option value="essay">서술형</option></select></div>
      <div class="form-group"><label class="form-label">자격등급 <span class="required">*</span></label>
        <select id="sp-grade" class="form-control form-select"></select></div>
    </div>
    <div class="modal-field-row-2col">
      <div class="form-group"><label class="form-label">국가기술자격명</label>
        <input id="sp-qual" class="form-control" placeholder="비우면 현대엔지비 직접개발"></div>
      <div class="form-group"><label class="form-label">역량 태그(선택)</label>
        <select id="sp-comp" class="form-control form-select"></select></div>
    </div>
    <div class="form-group"><label class="form-label">카테고리(선택)</label>
      <input id="sp-cat" class="form-control"></div>
    <div class="form-group"><label class="form-label">문항(질문) <span class="required">*</span></label>
      <textarea id="sp-question" class="form-control" rows="3"></textarea></div>
    <div id="sp-mcq">
      <div class="modal-field-row-2col">
        <div class="form-group"><label class="form-label">보기1 <span class="required">*</span></label><input id="sp-o1" class="form-control"></div>
        <div class="form-group"><label class="form-label">보기2 <span class="required">*</span></label><input id="sp-o2" class="form-control"></div>
        <div class="form-group"><label class="form-label">보기3 <span class="required">*</span></label><input id="sp-o3" class="form-control"></div>
        <div class="form-group"><label class="form-label">보기4 <span class="required">*</span></label><input id="sp-o4" class="form-control"></div>
      </div>
      <div class="form-group"><label class="form-label">정답 <span class="required">*</span></label>
        <select id="sp-answer" class="form-control form-select">
          <option value="1">보기1</option><option value="2">보기2</option>
          <option value="3">보기3</option><option value="4">보기4</option></select></div>
    </div>
    <div id="sp-essay" style="display:none;">
      <div class="form-group"><label class="form-label">모범답안</label>
        <textarea id="sp-model" class="form-control" rows="3"></textarea></div>
    </div>
    <div class="form-group"><label class="form-label">해설 <span class="required">*</span></label>
      <textarea id="sp-exp" class="form-control" rows="2"></textarea></div>
    <div id="sp-images-slot"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="sp-close">취소</button>
    <button class="btn btn-primary" data-act="sp-save">저장</button></div>
</div></div>

<!-- 템플릿 형식 모달 -->
<div id="sp-tpl-modal" class="modal-backdrop" style="display:none;"><div class="modal" style="max-width:420px;">
  <div class="modal-header"><h2 class="modal-title">📄 샘플 템플릿 다운로드</h2>
    <button class="modal-close" data-act="sp-tpl-close">✕</button></div>
  <div class="modal-body"><p class="tpl-desc">받을 파일 형식을 선택하세요.</p>
    <div class="tpl-choice">
      <button class="tpl-opt" data-act="sp-tpl-xlsx"><span class="tpl-opt-ic">📗</span>
        <span class="tpl-opt-name">엑셀 (.xlsx)</span><span class="tpl-opt-sub">권장 · 서식 안정적</span></button>
      <button class="tpl-opt" data-act="sp-tpl-csv"><span class="tpl-opt-ic">📄</span>
        <span class="tpl-opt-name">CSV (.csv)</span><span class="tpl-opt-sub">UTF-8 BOM · 범용</span></button>
    </div></div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="sp-tpl-close">취소</button></div>
</div></div>

<!-- 전체 다운로드 형식 모달 -->
<div id="sp-dlall-modal" class="modal-backdrop" style="display:none;"><div class="modal" style="max-width:420px;">
  <div class="modal-header"><h2 class="modal-title">⬇️ 현재 목록 다운로드</h2>
    <button class="modal-close" data-act="sp-dlall-close">✕</button></div>
  <div class="modal-body"><p class="tpl-desc">필터가 적용된 목록 <b id="sp-dlall-count">0</b>건을 받을 형식을 선택하세요.</p>
    <div class="tpl-choice">
      <button class="tpl-opt" data-act="sp-dlall-xlsx"><span class="tpl-opt-ic">📗</span>
        <span class="tpl-opt-name">엑셀 (.xlsx)</span><span class="tpl-opt-sub">권장 · 서식 안정적</span></button>
      <button class="tpl-opt" data-act="sp-dlall-csv"><span class="tpl-opt-ic">📄</span>
        <span class="tpl-opt-name">CSV (.csv)</span><span class="tpl-opt-sub">UTF-8 BOM · 범용</span></button>
    </div></div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="sp-dlall-close">취소</button></div>
</div></div>

<!-- 엑셀 업로드 모달 -->
<div id="sp-upload-modal" class="modal-backdrop" style="display:none;"><div class="modal modal-lg">
  <div class="modal-header"><h2 class="modal-title">📤 샘플 엑셀 일괄 업로드</h2>
    <button class="modal-close" data-act="sp-upload-close">✕</button></div>
  <div class="modal-body">
    <div class="upload-guide">파일을 선택하면 미리보기와 검증 결과가 표시됩니다. 유효한 행만 저장됩니다.
      이미지는 업로드 후 각 샘플 <b>수정</b>에서 개별 첨부하세요.</div>
    <input type="file" id="sp-upload-file" accept=".xlsx,.csv">
    <div id="sp-upload-preview"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="sp-upload-close">취소</button>
    <button class="btn btn-primary" data-act="sp-upload-save" id="sp-upload-save-btn" disabled>유효 행 저장</button></div>
</div></div>

<script src="js/lib/supabase.js"></script>
<script src="js/config.js"></script><script src="js/core.js"></script>
<script src="js/session.js"></script><script src="js/api.js"></script>
<script src="js/lib/xlsx.full.min.js"></script>
<script src="js/xlsx.js"></script>
<script src="js/samples.js"></script></body></html>
