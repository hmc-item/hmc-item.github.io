<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="css/common.css"></head><body style="padding:80px;">
<button class="btn btn-primary" id="t1">토스트</button>
<button class="btn btn-secondary" id="t2">로딩</button>
<button class="btn btn-danger" id="t3">확인창</button>
<button class="btn btn-orange" id="t4">DB 카운트</button>
<pre id="out"></pre>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script><script src="js/core.js"></script>
<script src="js/api.js"></script>
<script>
document.getElementById('t1').onclick = () => UI.toast("특수문자 ℃ ± ㎛ ' \" 테스트", 'success');
document.getElementById('t2').onclick = () => { UI.showLoading('로딩…'); setTimeout(UI.hideLoading, 1000); };
document.getElementById('t3').onclick = async () => { const r = await UI.confirm('진행할까요?\n줄바꿈 테스트'); UI.toast('결과: ' + r); };
document.getElementById('t4').onclick = async () => {
  const { count, error } = await DB.from('teams').select('*', { count: 'exact', head: true });
  document.getElementById('out').textContent = error ? ('ERR ' + error.message) : ('teams rows: ' + count);
};
</script></body></html>
