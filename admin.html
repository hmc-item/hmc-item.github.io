<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 문항개발 워크샵</title>
<link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/admin.css"></head>
<body><nav id="navbar"></nav><div class="page-wrapper">
  <div class="admin-header"><div><h1 class="page-title">관리자</h1>
    <p class="page-desc">조·역량 관리 및 진척 현황</p></div>
    <a class="btn btn-secondary btn-sm" href="samples.html">🧩 샘플 문항 관리</a></div>
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="teams">🗂️ 조 관리</button>
    <button class="admin-tab" data-tab="comps">📋 역량 관리</button>
    <button class="admin-tab" data-tab="dash">📊 진척 대시보드</button>
    <button class="admin-tab" data-tab="review">💬 코멘트</button>
    <button class="admin-tab" data-tab="notices">📢 공지 관리</button>
  </div>

  <div class="tab-content active" id="tab-teams"><div class="card">
    <div class="card-header"><span class="card-title">조 목록</span>
      <button class="btn btn-primary btn-sm" data-act="add-team">+ 조 추가</button></div>
    <div class="card-body"><div class="table-wrap"><table class="admin-table">
      <thead><tr><th>직무명(조)</th><th>분반</th><th>등록일</th><th>관리</th></tr></thead>
      <tbody id="teams-tbody"><tr><td colspan="4" class="table-empty">불러오는 중...</td></tr></tbody>
    </table></div></div></div></div>

  <div class="tab-content" id="tab-comps">
    <div class="card"><div class="card-header"><span class="card-title">역량 목록</span>
      <button class="btn btn-primary btn-sm" data-act="add-comp">+ 역량 추가</button></div>
      <div class="card-body"><div class="table-wrap"><table class="admin-table">
        <thead><tr><th>역량명</th><th>분류</th><th>담당 조</th><th>목표</th><th>관리</th></tr></thead>
        <tbody id="comps-tbody"><tr><td colspan="5" class="table-empty">탭을 선택하면 불러옵니다.</td></tr></tbody>
      </table></div></div></div>
  </div>
  <div class="tab-content" id="tab-dash">
    <div class="card"><div class="card-header"><span class="card-title">진척 현황</span>
      <div><button class="btn btn-secondary btn-sm" data-act="dash-refresh">🔄 새로고침</button>
        <button class="btn btn-secondary btn-sm" data-act="dash-csv">⬇️ 전체 문항 CSV</button></div></div>
      <div class="card-body">
        <div class="dash-summary" id="dash-summary"></div>
        <div class="dash-sub">분반별</div><div class="dash-grid" id="dash-class"></div>
        <div class="dash-sub" style="margin-top:24px;">역량별</div><div class="dash-grid" id="dash-comp"></div>
        <div class="dash-sub" style="margin-top:24px;">조별</div><div class="dash-grid" id="dash-team"></div>
      </div></div>
  </div>
  <div class="tab-content" id="tab-review">
    <div class="card"><div class="card-body" style="padding:0;">
      <iframe id="review-frame" style="width:100%;height:75vh;border:none;border-radius:12px;"></iframe>
    </div></div>
  </div>
  <div class="tab-content" id="tab-notices">
    <div class="card"><div class="card-header"><span class="card-title">공지 목록</span>
      <button class="btn btn-primary btn-sm" data-act="add-notice">+ 공지 추가</button></div>
      <div class="card-body"><div class="table-wrap"><table class="admin-table">
        <thead><tr><th>대상</th><th>제목</th><th>고정</th><th>등록일</th><th>관리</th></tr></thead>
        <tbody id="notices-tbody"><tr><td colspan="5" class="table-empty">탭을 선택하면 불러옵니다.</td></tr></tbody>
      </table></div></div></div>
  </div>
</div>

<!-- 조 모달 -->
<div id="team-modal" class="modal-backdrop" style="display:none;"><div class="modal" style="max-width:440px;">
  <div class="modal-header"><h2 class="modal-title" id="team-modal-title">조 추가</h2>
    <button class="modal-close" data-act="team-close">✕</button></div>
  <div class="modal-body"><input type="hidden" id="team-modal-id">
    <div class="form-group"><label class="form-label">직무명(조) <span class="required">*</span></label>
      <input type="text" id="team-modal-name" class="form-control" placeholder="예: 기계보전"></div>
    <div class="form-group"><label class="form-label">분반</label>
      <select id="team-modal-class" class="form-control form-select">
        <option value="">미지정</option>
        <option value="1">1분반</option><option value="2">2분반</option><option value="3">3분반</option>
      </select></div></div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="team-close">취소</button>
    <button class="btn btn-primary" data-act="team-save">저장</button></div>
</div></div>

<!-- 역량 모달 -->
<div id="comp-modal" class="modal-backdrop" style="display:none;"><div class="modal modal-lg">
  <div class="modal-header"><h2 class="modal-title" id="comp-modal-title">역량 추가</h2>
    <button class="modal-close" data-act="comp-close">✕</button></div>
  <div class="modal-body"><input type="hidden" id="comp-modal-id">
    <div class="form-group"><label class="form-label">역량명 <span class="required">*</span></label>
      <input type="text" id="comp-modal-name" class="form-control"></div>
    <div class="modal-field-row-2col">
      <div class="form-group"><label class="form-label">분류(역량군)</label>
        <input type="text" id="comp-modal-cat" class="form-control" placeholder="선택"></div>
      <div class="form-group"><label class="form-label">담당 조 <span class="required">*</span></label>
        <select id="comp-modal-team" class="form-control form-select"></select></div>
    </div>
    <div class="modal-field-row-2col">
      <div class="form-group"><label class="form-label">목표 문항 수</label>
        <input type="number" id="comp-modal-target" class="form-control" value="50" min="0"></div>
      <div class="form-group"><label class="form-label">정렬 순서</label>
        <input type="number" id="comp-modal-order" class="form-control" value="0"></div>
    </div>
    <div class="form-group"><label class="form-label">설명</label>
      <textarea id="comp-modal-desc" class="form-control" rows="2"></textarea></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="comp-close">취소</button>
    <button class="btn btn-primary" data-act="comp-save">저장</button></div>
</div></div>

<!-- 공지 모달 -->
<div id="notice-modal" class="modal-backdrop" style="display:none;"><div class="modal modal-lg">
  <div class="modal-header"><h2 class="modal-title" id="notice-modal-title">공지 추가</h2>
    <button class="modal-close" data-act="notice-close">✕</button></div>
  <div class="modal-body"><input type="hidden" id="notice-modal-id">
    <div class="form-group"><label class="form-label">제목 <span class="required">*</span></label>
      <input type="text" id="notice-modal-title-in" class="form-control" placeholder="예: 제출 마감 안내"></div>
    <div class="form-group"><label class="form-label">내용 <span class="required">*</span></label>
      <textarea id="notice-modal-content" class="form-control" rows="4"></textarea></div>
    <div class="form-group"><label class="form-label">대상 <span class="required">*</span></label>
      <div class="notice-scope">
        <label><input type="radio" name="notice-scope" value="common" checked> 공통(전체)</label>
        <label><input type="radio" name="notice-scope" value="teams"> 특정 조</label>
      </div></div>
    <div class="form-group" id="notice-teams-group" style="display:none;">
      <label class="form-label">대상 조 선택 <span class="required">*</span></label>
      <div id="notice-teams-box" class="notice-teams-box"></div></div>
    <div class="form-group"><label class="notice-pin-label">
      <input type="checkbox" id="notice-modal-pin"> 상단 고정(📌)</label></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" data-act="notice-close">취소</button>
    <button class="btn btn-primary" data-act="notice-save">저장</button></div>
</div></div>

<script src="js/lib/supabase.js"></script>
<script src="js/config.js"></script><script src="js/core.js"></script>
<script src="js/session.js"></script><script src="js/api.js"></script><script src="js/admin.js"></script>
</body></html>
